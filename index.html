<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q2 Drill 2</title>
</head>
<body>
    <div>
        <h2>Heat Index Checker</h2>
        <input type="text" id="howhot" class="form-control" placeholder="Input degree value (C)">
        <input type="text" id="howhumid" class="form-control" placeholder="Input humidity value (%)">
        <br>
        <button class="btn btn-info" onclick="checkTemp()">Check</button>
    </div>

    <script>
        function checkTemp(){
                var temperature = document.getElementById("howhot").value;
                var humidity = document.getElementById("howhumid").value;
                var message = "";

                switch(true){
                    case(temperature < 24):
                    message = "Cool";
                    break;
                    case(temperature <= 27):
                    message = "Warm";
                    break;
                    case(temperature <= 31):
                    message = "Hot";
                    break;
                    case(temperature <= 35):
                    message = "Very Hot";
                    break;
                    case(temperature => 36):
                    message = "Extreme heat";
                    break;
                    default:
                        message = "Temperature could not be determined.";
                }
                alert(message);

                switch(true){
                    case(humidity< 24):
                    message = "Cool";
                    break;
                    case(humidity <= 27):
                    message = "Warm";
                    break;
                    case(temperature <= 31):
                    message = "Hot";
                    break;
                    case(temperature <= 35):
                    message = "Very Hot";
                    break;
                    case(temperature => 36):
                    message = "Extreme heat";
                    break;
                    default:
                        message = "Temperature could not be determined.";
                }
            }
    </script>
    
</body>
</html>
