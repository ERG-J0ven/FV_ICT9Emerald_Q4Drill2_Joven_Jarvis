<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q2 Drill 2</title>
    <style>
        #heatchecker{
            border: 2px solid black;
            border-radius: 14px;
            margin-left: 400px;
            margin-right: 350px;
            background-color: #333a42;
            color: white;
         }
        body{
            background-color: #8cc2ff;
        }
    </style>
</head>
<body>
    <div id="heatchecker" class="col mt-3">
        <h2 style="margin-left: 20px;">Heat Index Checker</h2>
        <details ontoggle="howtoheat()" style="margin-left: 20px;">
            <summary><u></u></summary>
            <i id="instruct"></i>
        </details>

        <br>

        <input type="text" id="howhot" class="form-control w-50" placeholder="Input degree value (C)">
        
        <br>

        <input type="text" id="howhumid" class="form-control w-50" placeholder="Input humidity value (%)">
        <br>
        <button class="btn btn-info" onclick="checkTemp()">Check</button>

    </div>

    <script>
        function checkTemp(){
                var temperature = Number(document.getElementById("howhot").value);
                var humidity = Number(document.getElementById("howhumid").value);
                var message = "";
                var heatindex = temperature + (0.33 * humidity) - 4;

                switch(true){
                    case(heatindex <= 27):
                    message = "Cool";
                    break;
                    case(heatindex <= 32 ):
                    message = "Warm";
                    break;
                    case(heatindex <= 37):
                    message = "Hot";
                    break;
                    case(heatindex <= 41):
                    message = "Very Hot";
                    break;
                    case(heatindex => 42):
                    message = "Extreme heat";
                    break;
                    default:
                        message = "Temperature could not be determined.";
                }
            alert(message);
            }

        function howtoheat(){
            document.getElementById('instruct').innerHTML = "Input the temperature and the humidity, then click the check button to get the index. (Make sure that the temperature is in Celsius, not Fahrenheit.)"
        }
    </script>
    
</body>
</html>
