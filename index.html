<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q2 Drill 2</title>
</head>
<body>
    <div>
        <h2>Heat Index Checker</h2>
        <input type="text" id="howhot" class="form-control" placeholder="Input degree value (C)">
        <input type="text" id="howhumid" class="form-control" placeholder="Input humidity value (%)">
        <br>
        <button class="btn btn-info" onclick="checkTemp()">Check</button>
    </div>

    <script>
        function checkTemp(){
                var temperature = Number(document.getElementById("howhot").value);
                var humidity = Number(document.getElementById("howhumid").value);
                var message = "";
                var heatindex = temperature + (0.33 * humidity) - 4;

                switch(true){
                    case(heatindex <= 27):
                    message = "Cool";
                    break;
                    case(heatindex <= 32 ):
                    message = "Warm";
                    break;
                    case(heatindex <= 37):
                    message = "Hot";
                    break;
                    case(heatindex <= 41):
                    message = "Very Hot";
                    break;
                    case(heatindex => 42):
                    message = "Extreme heat";
                    break;
                    default:
                        message = "Temperature could not be determined.";
                }
            alert(message);
            }
    </script>
    
</body>
</html>
